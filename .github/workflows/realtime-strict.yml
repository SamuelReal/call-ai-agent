name: Realtime Strict E2E

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  preflight:
    name: Workflow preflight
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger context
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "actor=${{ github.actor }}"

  realtime-strict-mock:
    name: Realtime strict (mock providers)
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ !cancelled() }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run strict realtime E2E (mock)
        env:
          STT_PROVIDER: mock
          TTS_PROVIDER: mock
        run: npm run e2e:realtime:local -- ci_rt_mock_1

  realtime-strict-elevenlabs:
    name: Realtime strict (ElevenLabs)
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ !cancelled() && github.event_name != 'pull_request' && secrets.DEEPSEEK_API_KEY != '' && secrets.ELEVENLABS_API_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start server
        env:
          STT_PROVIDER: elevenlabs
          TTS_PROVIDER: elevenlabs
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_TTS_VOICE_ID: ${{ secrets.ELEVENLABS_TTS_VOICE_ID }}
          ELEVENLABS_TTS_MODEL_ID: eleven_multilingual_v2
        run: |
          nohup npm run start > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for health endpoint
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become healthy"
          cat server.log || true
          exit 1

      - name: Run strict realtime E2E (ElevenLabs)
        env:
          STT_PROVIDER: elevenlabs
          TTS_PROVIDER: elevenlabs
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_TTS_VOICE_ID: ${{ secrets.ELEVENLABS_TTS_VOICE_ID }}
          ELEVENLABS_TTS_MODEL_ID: eleven_multilingual_v2
        run: npm run e2e:realtime:strict -- ci_rt_elabs_1

      - name: Print server log on failure
        if: failure()
        run: cat server.log || true

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
