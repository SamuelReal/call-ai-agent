name: Realtime Strict E2E

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  preflight:
    name: Workflow preflight
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger context
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "actor=${{ github.actor }}"

  realtime-strict-mock:
    name: Realtime strict (mock providers)
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run strict realtime E2E (mock)
        env:
          STT_PROVIDER: mock
          TTS_PROVIDER: mock
        run: npm run e2e:realtime:local -- ci_rt_mock_1
